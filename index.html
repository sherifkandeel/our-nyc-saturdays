<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Our NYC Saturdays - A curated Saturday planner for Sherif and Sarah. 32 Saturdays from May through December 2026.">

  <meta property="og:title" content="Our NYC Saturdays">
  <meta property="og:description" content="32 curated Saturdays in New York City. May through December 2026.">
  <meta property="og:type" content="website">

  <title>Our NYC Saturdays</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='15' y='20' width='70' height='65' rx='8' fill='%23FAF7F2' stroke='%23C4644A' stroke-width='5'/%3E%3Crect x='15' y='20' width='70' height='18' rx='8' fill='%23C4644A'/%3E%3Crect x='15' y='30' width='70' height='8' fill='%23C4644A'/%3E%3Cline x1='35' y1='10' x2='35' y2='28' stroke='%23C4644A' stroke-width='5' stroke-linecap='round'/%3E%3Cline x1='65' y1='10' x2='65' y2='28' stroke='%23C4644A' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M50 50 C50 44, 42 40, 38 40 C32 40, 28 46, 28 50 C28 60, 50 72, 50 72 C50 72, 72 60, 72 50 C72 46, 68 40, 62 40 C58 40, 50 44, 50 50Z' fill='%23C4644A' opacity='0.85'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="season-spring">

  <!-- Site Header -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="#" class="header-logo">Our NYC Saturdays</a>
      </div>
      <div class="header-center">
        <span id="current-month" class="header-month"></span>
      </div>
      <div class="header-right">
        <button class="view-btn active" data-view="timeline" aria-label="Timeline view" title="Timeline view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="4" x2="15" y2="4"/>
            <line x1="3" y1="9" x2="15" y2="9"/>
            <line x1="3" y1="14" x2="15" y2="14"/>
            <circle cx="3" cy="4" r="1" fill="currentColor" stroke="none"/>
            <circle cx="3" cy="9" r="1" fill="currentColor" stroke="none"/>
            <circle cx="3" cy="14" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <button class="view-btn" data-view="calendar" aria-label="Calendar view" title="Calendar view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="14" height="13" rx="2"/>
            <line x1="2" y1="7" x2="16" y2="7"/>
            <line x1="6" y1="1" x2="6" y2="5"/>
            <line x1="12" y1="1" x2="12" y2="5"/>
            <rect x="4.5" y="9.5" width="2.5" height="2" rx="0.5" fill="currentColor" stroke="none"/>
            <rect x="7.75" y="9.5" width="2.5" height="2" rx="0.5" fill="currentColor" stroke="none"/>
            <rect x="11" y="9.5" width="2.5" height="2" rx="0.5" fill="currentColor" stroke="none"/>
            <rect x="4.5" y="13" width="2.5" height="2" rx="0.5" fill="currentColor" stroke="none" opacity="0.4"/>
          </svg>
        </button>
        <button class="view-btn" data-view="filter" aria-label="Filter view" title="Filter view">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="2" y1="4" x2="16" y2="4"/>
            <line x1="4" y1="9" x2="14" y2="9"/>
            <line x1="6" y1="14" x2="12" y2="14"/>
          </svg>
        </button>
        <button class="search-btn" id="search-toggle" aria-label="Search" title="Search">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="7.5" cy="7.5" r="5"/>
            <line x1="11" y1="11" x2="16" y2="16"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progress-bar" aria-hidden="true">
    <div class="progress-bar__fill" id="progress-fill" style="width: 0%"></div>
    <div class="progress-bar__tooltip" id="progress-tooltip"></div>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay" aria-hidden="true">
    <div class="search-overlay__inner">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Search by name, borough, category..."
        autocomplete="off"
        spellcheck="false"
      >
      <button class="search-close" id="search-close" aria-label="Close search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="14" y2="14"/>
          <line x1="14" y1="4" x2="4" y2="14"/>
        </svg>
      </button>
    </div>
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero__content">
      <h1 class="hero__title">Our NYC Saturdays</h1>
      <p class="hero__subtitle">32 Saturdays. May through December 2026.</p>
      <p class="hero__message">
        <em>I planned this for us for the remaining Saturdays in NYC, I hope you like it :)</em>
      </p>
      <p class="hero__signed">- Sherif</p>
    </div>
    <div class="hero__scroll-indicator" aria-hidden="true">
      <svg width="24" height="40" viewBox="0 0 24 40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="12" y1="8" x2="12" y2="32" class="scroll-line"/>
        <polyline points="7,27 12,32 17,27" class="scroll-arrow"/>
      </svg>
    </div>
    <div class="hero__gradient" aria-hidden="true"></div>
  </section>

  <!-- Main Content -->
  <main class="main-content" id="main-content">

    <!-- Timeline View (default) -->
    <div class="view-container" id="timeline-view">
      <!-- Cards are rendered by JS -->
    </div>

    <!-- Calendar View -->
    <div class="view-container hidden" id="calendar-view">
      <div class="calendar-grid" id="calendar-grid">
        <!-- Grid cells rendered by JS -->
      </div>
    </div>

    <!-- Filter View -->
    <div class="view-container hidden" id="filter-view">
      <div class="filter-bar" id="filter-bar">
        <!-- Filter pills rendered by JS -->
      </div>
      <div class="filter-results" id="filter-results">
        <!-- Filtered list rendered by JS -->
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p class="footer-message">Made with love, from Sherif to Sarah. NYC 2026.</p>
    <div class="footer-actions">
      <a href="#" class="footer-link" id="download-ics" aria-label="Download calendar file">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v8M4 7l4 4 4-4"/>
          <line x1="2" y1="13" x2="14" y2="13"/>
        </svg>
        Download calendar (.ics)
      </a>
      <button class="surprise-btn" id="surprise-btn">Surprise me</button>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
